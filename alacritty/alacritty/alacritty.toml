# alacritty.toml
live_config_reload = true

[window]
decorations     = "none"
dynamic_padding = false
dynamic_title   = true
opacity         = 1.0
startup_mode    = "Maximized"
title           = "Alacritty"

[window.padding]
x = 12
y = 12

[font]
builtin_box_drawing = false
size = 12

[font.bold]
family = "Berkeley Mono Trial"
style = "Bold"

[font.bold_italic]
family = "Berkeley Mono Trial"
style = "Bold Italic"

[font.italic]
family = "Berkeley Mono Trial"
style = "Italic"

[font.normal]
family = "Berkeley Mono Trial"
style = "Regular"
